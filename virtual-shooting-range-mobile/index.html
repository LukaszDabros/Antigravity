<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Range Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body class="cyber-theme">
    <div id="app">
        <!-- Podgląd wideo i celownik -->
        <div class="video-container">
            <video id="camera-feed" autoplay playsinline muted></video>
            <canvas id="detection-canvas"></canvas>
            <canvas id="ui-canvas"></canvas>
        </div>

        <!-- Nakładka UI (HUD) -->
        <div id="hud" class="flex-column">
            <!-- Pasek Graczy -->
            <div id="players-bar" class="flex-row">
                <button class="player-btn active" data-id="0">1. P</button>
                <button class="player-btn" data-id="1">2. P</button>
                <button class="player-btn" data-id="2">3. P</button>
                <button class="player-btn" data-id="3">4. P</button>
                <button class="player-btn" data-id="4">5. P</button>
            </div>

            <div class="top-bar flex-row">
                <div class="stat-box" id="mode-selector">
                    <span class="label">TRYB</span>
                    <span id="mode-val" class="value small">FREE</span>
                </div>
                <div class="stat-box">
                    <span class="label">PUNKTY</span>
                    <div class="flex-row stat-row">
                        <span id="score-val" class="value">0</span>
                        <button id="reset-session-btn" title="Resetuj wyniki gracza">🗑️</button>
                    </div>
                </div>
                <div class="stat-box">
                    <span class="label">ŚREDNIA</span>
                    <span id="avg-val" class="value">0.0</span>
                </div>
            </div>

            <!-- Odliczanie (Sesje) -->
            <div id="session-countdown" class="overlay">
                <div class="huge-text">READY?</div>
            </div>

            <!-- Podsumowanie Wyników -->
            <div id="result-modal" class="overlay">
                <div class="overlay-content result-card">
                    <h2>SESJA ZAKOŃCZONA</h2>
                    <div class="result-stats">
                        <div class="res-item"><span class="res-label">WYNIK:</span> <span id="res-score" class="res-value">0</span></div>
                        <div class="res-item"><span class="res-label">STRZAŁY:</span> <span id="res-shots" class="res-value">0</span></div>
                        <div class="res-item"><span class="res-label">ŚREDNIA:</span> <span id="res-avg" class="res-value">0.0</span></div>
                    </div>
                    <button id="close-result" class="glass-btn primary">ZAMKNIJ</button>
                </div>
            </div>

            <!-- Kalibracja (Overlay) -->
            <div id="calibration-overlay" class="overlay active">
                <div class="overlay-content">
                    <h1>KALIBRACJA</h1>
                    <p>Wskaż 4 rogi tarczy na ścianie (zaczynając od LG zgodnie z zegarem)</p>
                    <div class="progress-dots">
                        <span class="dot active"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
            </div>

            <!-- Sterowanie Zoomem i Trybami -->
            <div class="side-controls flex-column">
                <div class="zoom-controls">
                    <button id="zoom-in" class="zoom-btn">+</button>
                    <button id="zoom-out" class="zoom-btn">-</button>
                </div>
                <button id="mode-toggle" class="mode-btn">Zmień Tryb</button>
            </div>

            <div class="controls flex-row">
                <button id="reset-btn" class="glass-btn">RESET</button>
                <button id="start-session-btn" class="glass-btn primary big-btn">START SESJA</button>
                <button id="calibrate-btn" class="glass-btn">KALIBRACJA</button>
            </div>
            
            <div id="last-shot-box">
                OSTATNI: <span id="last-val">0</span>
            </div>
        </div>

        <!-- Audio -->
        <audio id="shot-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-gunshot-731.mp3" preload="auto"></audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
