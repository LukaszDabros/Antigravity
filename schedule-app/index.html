<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik Zajęć WF - Szkoły Prezentek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b1120;
            color: #f8fafc;
            /* Subtle sporty background: dynamic diagonal stripes matching slightly with school theme (navy/white/blue) */
            background-image: repeating-linear-gradient(45deg,
                    rgba(255, 255, 255, 0.015) 0px,
                    rgba(255, 255, 255, 0.015) 2px,
                    transparent 2px,
                    transparent 10px);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid rgba(96, 165, 250, 0.2);
            /* Changed to blue-400 to match logo */
        }

        .gradient-text {
            /* Adjusted to school colors (Navy to Light Blue variant that still looks sporty) */
            background: linear-gradient(to right, #38bdf8, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sporty-badge {
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            padding: 0.25rem 1rem;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #38bdf8;
        }

        .school-logo {
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
            transition: transform 0.3s ease;
        }

        .school-logo:hover {
            transform: scale(1.05) rotate(-2deg);
        }
    </style>
    <script src="schedule_data.js"></script>
</head>

<body class="min-h-screen flex flex-col items-center p-4 sm:p-8 relative overflow-x-hidden">

    <!-- Subtle glow effects tuned to blue/cyan -->
    <div
        class="absolute top-[-100px] left-[-100px] w-96 h-96 bg-cyan-500/10 rounded-full blur-[100px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-100px] right-[-100px] w-96 h-96 bg-blue-600/10 rounded-full blur-[100px] pointer-events-none">
    </div>

    <!-- Header -->
    <header
        class="w-full max-w-5xl flex flex-col md:flex-row justify-between items-center mb-8 gap-6 z-10 animate-fade-in">
        <div class="flex items-center gap-5">
            <!-- School Logo -->
            <a href="https://szkolyprezentekkrakow.pl/" target="_blank" rel="noopener noreferrer">
                <img src="logo.png" alt="Szkoły Prezentek Kraków" class="h-16 w-auto school-logo sm:h-20"
                    onerror="this.onerror=null; this.src='https://szkolyprezentekkrakow.pl/wp-content/uploads/elementor/thumbs/logo_2szkoly_medium-pgfqbz1chye81rtge62bkwv5uq6f3rh3djxt2o270g.png'">
            </a>

            <div class="hidden sm:block h-12 w-px bg-slate-700/80 rounded-full"></div>

            <div>
                <h1
                    class="text-3xl sm:text-4xl font-black gradient-text tracking-tighter uppercase italic drop-shadow-sm pr-2">
                    Grafik WF</h1>
                <p class="text-slate-400 mt-1 font-medium tracking-wide">Sezon 2025/2026</p>
            </div>
        </div>

        <!-- Controls -->
        <div
            class="glass-card p-3 sm:p-4 rounded-2xl flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto shadow-2xl">
            <div class="flex items-center gap-3">
                <button id="prevWeekBtn"
                    class="p-2 rounded-xl bg-slate-800 hover:bg-slate-700 hover:text-cyan-400 transition-colors text-slate-300 border border-slate-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>
                <div class="flex flex-col items-center min-w-[150px]">
                    <span id="weekInfoLabel"
                        class="text-xs font-bold text-cyan-400 uppercase tracking-widest sporty-badge bg-cyan-500/10 mb-1 inline-block border border-cyan-500/20">Tydzień
                        A</span>
                    <div class="flex items-center gap-2">
                        <span id="dateRangeLabel" class="text-sm text-slate-300 font-semibold tracking-wide">02.03 -
                            06.03</span>
                        <button id="settingsBtn" class="text-slate-500 hover:text-cyan-400 transition-colors p-1 rounded-full hover:bg-slate-800" title="Ustawienia cyklu">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </button>
                    </div>
                </div>
                <button id="nextWeekBtn"
                    class="p-2 rounded-xl bg-slate-800 hover:bg-slate-700 hover:text-cyan-400 transition-colors text-slate-300 border border-slate-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
            <div class="h-8 w-px bg-slate-700 hidden sm:block"></div>
            <div
                class="flex items-center w-full sm:w-auto overflow-hidden rounded-xl border border-slate-700 bg-slate-800/50 p-1 hover:border-cyan-500/50 transition-colors">
                <input type="date" id="dateSelector"
                    class="w-full bg-transparent text-slate-200 px-3 py-1 font-medium focus:outline-none focus:text-cyan-400 transition-colors cursor-pointer">
            </div>
        </div>
    </header>

    <!-- Days Navigation -->
    <nav class="w-full max-w-5xl flex overflow-x-auto gap-3 mb-8 pb-3 snap-x z-10" id="daysNav">
        <!-- Populated by JS -->
    </nav>

    <!-- Schedule Content -->
    <main class="w-full max-w-5xl z-10" id="scheduleContainer">
        <!-- Populated by JS -->
    </main>

    <script>
        const daysENtoPL = {
            'monday': 'Poniedziałek', 'tuesday': 'Wtorek', 'wednesday': 'Środa', 'thursday': 'Czwartek', 'friday': 'Piątek'
        };

        const BASE_DATE = new Date('2026-03-02T00:00:00');
        let currentDate = new Date();
        let offset2 = 0;
        let offset3 = 0;
        let configSha = '';
        if (currentDate.getDay() === 0) {
            currentDate.setDate(currentDate.getDate() + 1);
        } else if (currentDate.getDay() === 6) {
            currentDate.setDate(currentDate.getDate() + 2);
        }
        let activeDay = 'monday';

        const prevWeekBtn = document.getElementById('prevWeekBtn');
        const nextWeekBtn = document.getElementById('nextWeekBtn');
        const dateSelector = document.getElementById('dateSelector');
        const weekInfoLabel = document.getElementById('weekInfoLabel');
        const dateRangeLabel = document.getElementById('dateRangeLabel');
        const daysNav = document.getElementById('daysNav');
        const scheduleContainer = document.getElementById('scheduleContainer');

        function getMonday(d) {
            d = new Date(d);
            var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function updateState() {
            const currentMonday = getMonday(currentDate);
            const baseMonday = getMonday(BASE_DATE);
            const diffTime = currentMonday - baseMonday;
            const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));

            const weekIndex2 = (((diffWeeks + offset2) % 2) + 2) % 2;
            const weekIndex3 = (((diffWeeks + offset3) % 3) + 3) % 3;

            const friday = new Date(currentMonday);
            friday.setDate(friday.getDate() + 4);
            const formatDt = (dt) => dt.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit' });
            dateRangeLabel.textContent = `${formatDt(currentMonday)} - ${formatDt(friday)}`;

            weekInfoLabel.textContent = `2T: ${weekIndex2 + 1}  •  3T: ${weekIndex3 + 1}`;

            // Fix timezone issue when setting the date selector value
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            dateSelector.value = `${year}-${month}-${day}`;

            const dayOfWeek = currentDate.getDay();
            const daysArray = Object.keys(scheduleData);
            activeDay = (dayOfWeek >= 1 && dayOfWeek <= 5) ? daysArray[dayOfWeek - 1] : 'monday';

            renderTabs();
            renderSchedule(weekIndex2, weekIndex3);
        }

        function renderTabs() {
            daysNav.innerHTML = '';
            Object.keys(scheduleData).forEach((day, index) => {
                const isActive = day === activeDay;
                const btn = document.createElement('button');
                
                const currentMonday = getMonday(currentDate);
                const tabDate = new Date(currentMonday);
                tabDate.setDate(currentMonday.getDate() + index);
                const dateStr = `${tabDate.getDate()}.${String(tabDate.getMonth() + 1).padStart(2, '0')}`;

                // Cyan/Blue theme for active tab
                btn.className = `flex flex-col items-center justify-center snap-start whitespace-nowrap px-6 py-2 rounded-xl font-bold uppercase text-sm tracking-wide transition-all duration-300 border-b-2 ${isActive ? 'bg-slate-800 border-cyan-400 text-cyan-400 shadow-[0_4px_20px_-4px_rgba(34,211,238,0.2)]' : 'bg-transparent border-transparent text-slate-500 hover:text-slate-300 hover:bg-slate-800/50'}`;
                
                btn.innerHTML = `
                    <span class="text-[0.65rem] opacity-75 tracking-widest font-semibold">${dateStr}</span>
                    <span>${daysENtoPL[day]}</span>
                `;

                btn.onclick = () => {
                    const currentMonday = getMonday(currentDate);
                    const dayOffset = Object.keys(scheduleData).indexOf(day);
                    currentDate = new Date(currentMonday);
                    currentDate.setDate(currentMonday.getDate() + dayOffset);
                    updateState();
                };
                daysNav.appendChild(btn);
            });
        }

        function renderSchedule(w2, w3) {
            scheduleContainer.innerHTML = '';
            const dayData = scheduleData[activeDay] || [];

            if (dayData.length === 0) {
                scheduleContainer.innerHTML = '<div class="glass-card rounded-2xl text-center text-slate-500 py-16 font-medium text-lg italic">Brak zaplanowanych treningów</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6';

            dayData.forEach(lessonObj => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl rounded-tr-[2rem] p-6 hover:-translate-y-2 hover:shadow-[0_10px_30px_-10px_rgba(56,189,248,0.15)] transition-all duration-300';

                const header = document.createElement('div');
                header.className = 'flex items-center gap-3 mb-5 pb-4 border-b border-slate-700/50';
                header.innerHTML = `
          <div class="bg-blue-500/10 text-blue-400 p-2.5 rounded-xl border border-blue-500/20 shadow-inner">
             <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6l3 3"/>
             </svg>
          </div>
          <h2 class="text-2xl font-black text-white italic tracking-tight">LEKCJA ${lessonObj.lesson.replace('l.', '').trim()}</h2>
        `;
                card.appendChild(header);

                const list = document.createElement('div');
                list.className = 'space-y-4';

                lessonObj.teachers.forEach((t, index) => {
                    let groupText = t.groups.length === 1 ? t.groups[0] :
                        (t.groups.length === 2 ? (t.groups[w2] || t.groups[0]) :
                            (t.groups[w3] || t.groups[0]));
                    if (!groupText) return;

                    const tItem = document.createElement('div');

                    // Alternating strong background colors based on index matching school theme
                    const bgClass = index % 2 === 0 ? 'bg-blue-900/40 shadow-sm' : 'bg-[rgba(108,33,110,0.6)]';

                    tItem.className = `${bgClass} rounded-xl rounded-l-none pl-4 pr-3 py-3 border ${index % 2 === 0 ? 'border-blue-500/30 border-l-cyan-500 hover:border-l-cyan-300 hover:bg-slate-800' : 'border-purple-600/30 border-l-purple-500 hover:border-l-pink-400 hover:bg-[rgba(108,33,110,0.8)]'} border-l-4 transition-all relative group overflow-hidden`;

                    tItem.innerHTML = `
            <div class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-cyan-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">${t.teacher}</span>
            </div>
            <div class="text-base font-semibold text-white group-hover:text-cyan-300 transition-colors">
              ${groupText}
            </div>
          `;
                    list.appendChild(tItem);
                });

                card.appendChild(list);
                grid.appendChild(card);
            });

            scheduleContainer.appendChild(grid);
        }

        prevWeekBtn.addEventListener('click', () => { currentDate.setDate(currentDate.getDate() - 7); updateState(); });
        nextWeekBtn.addEventListener('click', () => { currentDate.setDate(currentDate.getDate() + 7); updateState(); });
        dateSelector.addEventListener('change', (e) => { if (e.target.value) { currentDate = new Date(e.target.value); updateState(); } });

        // MODAL LOGIC
        const settingsOverlay = document.createElement('div');
        settingsOverlay.id = 'settingsOverlay';
        settingsOverlay.className = 'fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300';
        settingsOverlay.innerHTML = `
            <!-- Password Form -->
            <div id="passwordModal" class="glass-card p-6 rounded-2xl w-full max-w-sm m-4 shadow-2xl transform scale-95 transition-transform duration-300">
                <h3 class="text-xl font-bold text-white mb-4 italic gradient-text">Autoryzacja</h3>
                <p class="text-slate-400 text-sm mb-4">Podaj hasło, aby uzyskać dostęp do ustawień z kantorka.</p>
                <input type="password" id="passwordInput" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-colors mb-4" placeholder="••••••••">
                <div class="flex justify-end gap-3">
                    <button id="cancelPasswordBtn" class="px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">Anuluj</button>
                    <button id="submitPasswordBtn" class="px-5 py-2 rounded-xl bg-cyan-600 hover:bg-cyan-500 text-white font-bold transition-colors">Odblokuj</button>
                </div>
                <p id="passwordError" class="text-red-400 text-xs mt-3 hidden">Nieprawidłowe hasło!</p>
            </div>

            <!-- Settings Form -->
            <div id="offsetModal" class="glass-card p-6 rounded-2xl w-full max-w-sm m-4 shadow-2xl hidden transform scale-95 transition-transform duration-300">
                <h3 class="text-xl font-bold text-white mb-4 italic gradient-text">Cykl Tygodni</h3>
                <p class="text-slate-400 text-sm mb-5">Ustaw ręcznie cykl dla widocznego tygodnia. Następne tygodnie połączą się rotacyjnie na podstawie tej wartości.</p>
                
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-cyan-400 uppercase tracking-widest mb-2">Tydzień 2T</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button class="t2-btn py-2 rounded-xl border border-slate-700 text-slate-300 transition-colors" data-val="0">1</button>
                            <button class="t2-btn py-2 rounded-xl border border-slate-700 text-slate-300 transition-colors" data-val="1">2</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-cyan-400 uppercase tracking-widest mb-2">Tydzień 3T</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button class="t3-btn py-2 rounded-xl border border-slate-700 text-slate-300 transition-colors" data-val="0">1</button>
                            <button class="t3-btn py-2 rounded-xl border border-slate-700 text-slate-300 transition-colors" data-val="1">2</button>
                            <button class="t3-btn py-2 rounded-xl border border-slate-700 text-slate-300 transition-colors" data-val="2">3</button>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3">
                    <button id="closeSettingsBtn" class="px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">Anuluj</button>
                    <button id="saveSettingsBtn" class="px-5 py-2 rounded-xl bg-cyan-600 hover:bg-cyan-500 text-white font-bold transition-colors">Zastosuj</button>
                </div>
            </div>
        `;
        document.body.appendChild(settingsOverlay);

        const settingsBtn = document.getElementById('settingsBtn');
        const passwordModal = document.getElementById('passwordModal');
        const offsetModal = document.getElementById('offsetModal');
        const passInput = document.getElementById('passwordInput');
        
        let tempW2 = 0;
        let tempW3 = 0;

        const closeModals = () => {
            settingsOverlay.classList.remove('opacity-100');
            settingsOverlay.classList.add('opacity-0');
            passwordModal.classList.remove('scale-100');
            passwordModal.classList.add('scale-95');
            offsetModal.classList.remove('scale-100');
            offsetModal.classList.add('scale-95');
            setTimeout(() => settingsOverlay.classList.add('hidden'), 300);
        };

        settingsBtn.addEventListener('click', () => {
            settingsOverlay.classList.remove('hidden');
            setTimeout(() => {
                settingsOverlay.classList.remove('opacity-0');
                settingsOverlay.classList.add('opacity-100');
                passwordModal.classList.remove('scale-95');
                passwordModal.classList.add('scale-100');
            }, 10);
            passInput.value = '';
            document.getElementById('passwordError').classList.add('hidden');
            passwordModal.classList.remove('hidden');
            offsetModal.classList.add('hidden');
            passInput.focus();
        });

        document.getElementById('cancelPasswordBtn').onclick = closeModals;
        document.getElementById('closeSettingsBtn').onclick = closeModals;

        const updateSettingsUI = () => {
            document.querySelectorAll('.t2-btn').forEach(btn => {
               if (parseInt(btn.dataset.val) === tempW2) {
                   btn.className = 't2-btn py-2 rounded-xl border bg-cyan-600 text-white border-cyan-500 font-bold transition-colors shadow-lg';
               } else {
                   btn.className = 't2-btn py-2 rounded-xl border border-slate-700 text-slate-300 hover:bg-slate-800 transition-colors';
               }
            });
            document.querySelectorAll('.t3-btn').forEach(btn => {
               if (parseInt(btn.dataset.val) === tempW3) {
                   btn.className = 't3-btn py-2 rounded-xl border bg-cyan-600 text-white border-cyan-500 font-bold transition-colors shadow-lg';
               } else {
                   btn.className = 't3-btn py-2 rounded-xl border border-slate-700 text-slate-300 hover:bg-slate-800 transition-colors';
               }
            });
        };

        const openSettings = () => {
            passwordModal.classList.add('hidden');
            offsetModal.classList.remove('hidden');
            setTimeout(() => {
                offsetModal.classList.remove('scale-95');
                offsetModal.classList.add('scale-100');
            }, 10);
            
            const diffTime = getMonday(currentDate) - getMonday(BASE_DATE);
            const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));
            tempW2 = (((diffWeeks + offset2) % 2) + 2) % 2;
            tempW3 = (((diffWeeks + offset3) % 3) + 3) % 3;
            updateSettingsUI();
        };

        document.getElementById('submitPasswordBtn').onclick = async () => {
            const submitBtn = document.getElementById('submitPasswordBtn');
            document.getElementById('passwordError').classList.add('hidden');
            const prevText = submitBtn.textContent;
            submitBtn.textContent = 'Weryfikacja...';
            
            try {
                const token = await decryptToken(passInput.value);
                if (token.startsWith('github_pat_')) {
                    openSettings();
                } else throw new Error();
            } catch(e) {
                document.getElementById('passwordError').classList.remove('hidden');
            } finally {
                submitBtn.textContent = prevText;
            }
        };

        passInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') document.getElementById('submitPasswordBtn').click();
        });

        document.querySelectorAll('.t2-btn').forEach(b => b.onclick = (e) => { tempW2 = parseInt(e.target.dataset.val); updateSettingsUI(); });
        document.querySelectorAll('.t3-btn').forEach(b => b.onclick = (e) => { tempW3 = parseInt(e.target.dataset.val); updateSettingsUI(); });

        document.getElementById('saveSettingsBtn').onclick = async () => {
            const saveBtn = document.getElementById('saveSettingsBtn');
            const prevText = saveBtn.textContent;
            saveBtn.textContent = 'Synchronizacja...';
            saveBtn.disabled = true;

            const diffTime = getMonday(currentDate) - getMonday(BASE_DATE);
            const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));
            
            const newOffset2 = (((tempW2 - diffWeeks) % 2) + 2) % 2;
            const newOffset3 = (((tempW3 - diffWeeks) % 3) + 3) % 3;
            
            try {
                const token = await decryptToken(passInput.value);
                const newConfig = { offset2: newOffset2, offset3: newOffset3 };
                const contentStr = JSON.stringify(newConfig, null, 2);
                const encodedContent = btoa(unescape(encodeURIComponent(contentStr)));

                const reqBody = {
                    message: 'Aktualizacja rotacji przez ukryty Panel Kantorek',
                    content: encodedContent,
                    branch: 'main'
                };
                if (configSha) reqBody.sha = configSha;

                const res = await fetch('https://api.github.com/repos/LukaszDabros/Antigravity/contents/schedule-app/config.json', {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(reqBody)
                });

                if (res.ok) {
                    const data = await res.json();
                    configSha = data.content.sha;
                    offset2 = newOffset2;
                    offset3 = newOffset3;
                    updateState();
                    closeModals();
                } else {
                    alert('Nie udało się zapisać ustawień na serwerze! Sprawdź połączenie.');
                }
            } catch(e) {
                alert('Sesja wygasła lub wystąpił błąd autoryzacji.');
            } finally {
                saveBtn.textContent = prevText;
                saveBtn.disabled = false;
            }
        };

        async function decryptToken(password) {
            const encryptedToken = '{"salt":"pr67W2hjwBP4UhuXtKPuaw==","iv":"YTVPvV87anPzmchA","data":"nMXFRtfjCnr3mjM0oNIoZYG9R+csqiUJY+4KkE+xmdBzzfFSJFPDeWC/g99zWsvQGPF9QHqWEFKQrvXCiWUOtjHL2yZAZlkW6IdH1VUr/GgkSjgUcEUt/XMcSnCM8r5A2xMDeiylRhn87EC2DQ=="}';
            const obj = JSON.parse(encryptedToken);
            const iv = Uint8Array.from(atob(obj.iv), c => c.charCodeAt(0));
            const salt = Uint8Array.from(atob(obj.salt), c => c.charCodeAt(0));
            const data = Uint8Array.from(atob(obj.data), c => c.charCodeAt(0));

            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw",
                enc.encode(password),
                { name: "PBKDF2" },
                false,
                ["deriveBits", "deriveKey"]
            );
            const key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                true,
                ["decrypt"]
            );
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
            return new TextDecoder().decode(decrypted);
        }

        async function initApp() {
            try {
                const res = await fetch('https://api.github.com/repos/LukaszDabros/Antigravity/contents/schedule-app/config.json?v=' + Date.now(), { cache: 'no-store' });
                if (res.ok) {
                    const data = await res.json();
                    configSha = data.sha;
                    const contentStr = decodeURIComponent(escape(atob(data.content)));
                    const configData = JSON.parse(contentStr);
                    offset2 = configData.offset2 || 0;
                    offset3 = configData.offset3 || 0;
                }
            } catch (err) {
                console.warn('Uruchamianie lokalne: brak połączenia z bazą.');
            }
            updateState();
        }

        updateState(); // render immediately to avoid blank screen
        initApp(); // fetch remote and re-render if needed
